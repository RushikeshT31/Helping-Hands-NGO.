<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Helping Hands NGO </title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    background:linear-gradient(135deg,#f0fdfc,#d9f3ef,#eef9f8);

    padding:40px;

}

.login-container{

    width:760px;

    background:white;

    padding:45px;

    border-radius:25px;

    box-shadow:0 20px 45px rgba(0,0,0,.12);

    border-top:8px solid #009688;

}

.logo{

    width:100px;

    height:100px;

    margin:auto;

    border-radius:50%;

    background:linear-gradient(135deg,#009688,#006d77);

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:48px;

    color:white;

    margin-bottom:20px;

}

h1{

    text-align:center;

    color:#006d77;

    font-size:38px;

    margin-bottom:15px;

}

.subtitle{

    text-align:center;

    color:#555;

    font-size:16px;

    line-height:1.8;

    margin-bottom:35px;

}

.input-box{

    margin-bottom:18px;

}

.input-box input{

    width:100%;

    padding:16px;

    border:2px solid #d8d8d8;

    border-radius:12px;

    font-size:16px;

    transition:.3s;

}

.input-box input:focus{

    outline:none;

    border-color:#009688;

    box-shadow:0 0 12px rgba(0,150,136,.25);

}

button{

    width:100%;

    padding:16px;

    background:#009688;

    color:white;

    border:none;

    border-radius:12px;

    font-size:18px;

    font-weight:600;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#006d77;

}

.home-btn{

    display:block;

    margin-top:18px;

    text-align:center;

    text-decoration:none;

    background:#FFD54F;

    color:#222;

    padding:15px;

    border-radius:12px;

    font-weight:600;

    transition:.3s;

}

.home-btn:hover{

    background:#f4c430;

}

.footer{

    text-align:center;

    margin-top:25px;

    color:#666;

    font-size:14px;

}

.footer span{

    color:#009688;

    font-weight:600;

}

</style>

</head>

<body>

<div class="login-container">

<div class="logo">

🤝

</div>

<h1>

Helping Hands NGO

</h1>

<p class="subtitle">

Join Helping Hands NGO and become a part of a compassionate community dedicated to improving lives through education, healthcare, food distribution, etc. 

</p>

<form action="/register" method="POST">

<div class="input-box">

<input
type="text"
name="username"
placeholder="👤 Full Name"
required>

</div>

<div class="input-box">

<input
type="email"
name="email"
placeholder="📧 Email Address"
required>

</div>

<div class="input-box">

<input
type="tel"
name="phone"
placeholder="📱 Mobile Number"
required>

</div>

<div class="input-box">

<input
type="text"
name="city"
placeholder="🏙️ City"
required>

</div>

<div class="input-box">

<input
type="password"
name="password"
placeholder="🔒 Create Password"
required>

</div>

<button type="submit">

❤️ Register 

</button>

</form>

<a href="/" class="home-btn">

🏠 Back To Home

</a>

<div class="footer">

Together We Can Change Lives ❤️

<br><br>

</div>

</div>

</body>

</html>
